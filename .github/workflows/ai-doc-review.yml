name: Qwen CLI PR Auto Review & Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  qwen-agent-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Qwen CLI
        run: |
          npm install -g @qwen-code/qwen-code

      - name: Prepare workspace
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > pr_changes.diff
          
          changed_files=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | grep -E '\.(md|markdown)$' | tr '\n' ' ')
          
          cat > review_prompt.txt << 'PROMPT'
          You are a documentation reviewer. Review the changes in this PR and fix any issues you find.

          Changed files: __CHANGED_FILES__
          
          Please:
          1. Read pr_changes.diff to see what was changed
          2. Open each changed file and check for:
             - Typos or grammar errors
             - Formatting issues (markdown syntax, headings, lists, tables)
             - Broken links or image references
             - Duplicate content or contradictions
             - Missing information
          
          3. Think out loud as you review. Explain what you're checking and what you find.
          
          4. If you find issues, use the edit tool to fix them directly.
          
          5. After you finish, provide a summary in this format:
          
          SUMMARY_START
          ## Issues Found and Fixed:
          [If issues were found and fixed, list them here with file names]
          [If no issues were found, write: "No issues detected in the changes."]
          SUMMARY_END
          
          COMMIT_MESSAGE_START
          [ONLY if you actually edited files, write a commit message here]
          [If no edits were made, write: NO_EDITS]
          COMMIT_MESSAGE_END

          Start review now.
          PROMPT
          
          sed -i "s|__CHANGED_FILES__|${changed_files}|g" review_prompt.txt
          
          echo "=== Review Prompt ==="
          cat review_prompt.txt
          echo "==================="

      - name: Run Qwen agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: "https://ai.tribios.top/v1"
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          set +e
          qwen --prompt "$(cat review_prompt.txt)" \
               --approval-mode yolo 2>&1 | tee qwen.log
          qwen_exit_code=$?
          set -e
          
          echo "=== Qwen Exit Code: $qwen_exit_code ==="
          
          if [ ! -f qwen.log ] || [ ! -s qwen.log ]; then
            echo "ERROR: qwen.log is missing or empty"
            echo "Creating fallback log"
            echo "Qwen execution failed or produced no output" > qwen.log
          fi
          
          echo "=== Qwen Output ==="
          cat qwen.log
          echo "=================="

      - name: Commit and push fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No fixes applied"
            rm -f pr_changes.diff qwen.log review_prompt.txt
            exit 0
          fi
          
          git add -A
          
          commit_msg=$(sed -n '/COMMIT_MESSAGE_START/,/COMMIT_MESSAGE_END/p' qwen.log | sed '1d;$d' | tr -d '\r' | xargs)
          
          if [ -z "$commit_msg" ] || [ "$commit_msg" = "NO_EDITS" ]; then
            echo "AI did not make any edits"
            exit 0
          fi
          
          git commit -m "$commit_msg"
          git push

      - name: Post review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            if (!fs.existsSync('qwen.log')) {
              console.log('qwen.log not found, skipping comment');
              return;
            }
            
            const log = fs.readFileSync('qwen.log', 'utf8');
            
            const summaryMatch = log.match(/SUMMARY_START\s*\n([\s\S]*?)\nSUMMARY_END/);
            const summary = summaryMatch ? summaryMatch[1].trim() : 'No issues found or fixes applied.';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Documentation Review\n\n${summary}\n\n---\n*Automated by Qwen agent*`
            });

      - name: Cleanup
        if: always()
        run: rm -f pr_changes.diff qwen.log review_prompt.txt
