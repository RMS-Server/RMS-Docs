name: Qwen CLI PR Auto Review & Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  qwen-agent-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Qwen CLI
        run: |
          npm install -g @qwen-code/qwen-code

      - name: Prepare workspace
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > pr_changes.diff
          
          cat > review_prompt.txt << 'PROMPT'
          You are reviewing a documentation project PR. Analyze changes and fix issues automatically.

          Task:
          1. Read pr_changes.diff to understand what changed
          2. Inspect all modified markdown/doc files for these specific issues:
             
             a) Content Duplication
                - Check if new content duplicates existing sections
                - Find repeated paragraphs or redundant information
             
             b) Logical Conflicts
                - Identify contradictions with existing documentation
                - Check version mismatches or conflicting instructions
             
             c) Formatting & Readability
                - Verify markdown syntax correctness
                - Check heading hierarchy (proper # levels)
                - Ensure lists, tables, code blocks are properly formatted
                - Validate indentation and line breaks
             
             d) Broken References
                - Check all links (both internal [](file.md) and external http://)
                - Verify file paths and anchors exist
                - Validate image references in Assets/
          
          3. For each issue found, directly edit the affected files to fix it
          4. Summarize all fixes made with file names and issue types

          Start review now.
          
          After finishing fixes, generate a concise git commit message summarizing what you fixed.
          Output format:
          COMMIT_MESSAGE_START
          <your commit message here>
          COMMIT_MESSAGE_END
          PROMPT

      - name: Run Qwen agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: "https://ai.tribios.top/v1"
          OPENAI_MODEL: "gemini-2.5-pro"
        run: |
          qwen --prompt "$(cat review_prompt.txt)" \
               --approval-mode yolo \
               2>&1 | tee qwen.log

      - name: Commit and push fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No fixes applied"
            exit 0
          fi
          
          git add -A
          
          commit_msg=$(sed -n '/COMMIT_MESSAGE_START/,/COMMIT_MESSAGE_END/p' qwen.log | sed '1d;$d')
          if [ -z "$commit_msg" ]; then
            commit_msg="docs: AI auto-fix from documentation review"
          fi
          
          git commit -m "$commit_msg"
          git push

      - name: Post review summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('qwen.log', 'utf8');
            
            const summaryMatch = log.match(/4\. Summarize.*?(?=COMMIT_MESSAGE_START|$)/s);
            const summary = summaryMatch ? summaryMatch[0].trim() : 'Review completed, check the latest commit for details.';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Documentation Review\n\n${summary}\n\n---\n*Automated by Qwen agent*`
            });
