name: Send GET Request on Push

on:
  push:
    branches:
      - master

jobs:
  send-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync repository
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "SYNC_TOKEN is not configured"
            exit 1
          fi

          archive_path="$(mktemp -p "${RUNNER_TEMP:-/tmp}" repo.tar.gz.XXXXXX)"
          if ! tar --exclude='.git' --exclude='.github' -czf "$archive_path" -C . .; then
            echo "Failed to create repository archive"
            rm -f "$archive_path"
            exit 1
          fi

          retries=1
          while [ $retries -ge 0 ]; do
            if curl --fail -X POST \
               -H 'Content-Type: application/octet-stream' \
               --data-binary "@$archive_path" \
               "https://docs.rms.net.cn/api/sync?token=${SYNC_TOKEN}" && \
               timeout 10s curl -X GET 'http://api.chuckfang.com/XRPAD/RMS%20Docs%20Update/The%20docs%20has%20update%20certainly' && \
               timeout 10s curl -X GET 'http://api.chuckfang.com/XRPHONE/RMS%20Docs%20Update/The%20docs%20has%20update%20certainly'; then
              rm -f "$archive_path"
              exit 0
            fi
            retries=$((retries-1))
            if [ $retries -ge 0 ]; then
              sleep 5
            fi
          done
          rm -f "$archive_path"
          exit 1
