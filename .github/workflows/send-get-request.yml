name: Send GET Request on Push

on:
  push:
    branches:
      - master

jobs:
  send-request:
    runs-on: ubuntu-latest
    steps:
      - name: Send GET Request
        retries: 1
        continue-on-error: true
        run: |
          timeout 10s curl -X GET 'http://apinew.rms.net.cn:8010/?token=tribios' || exit 1
